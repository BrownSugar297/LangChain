<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <style>
    .box { stroke-width: 2; rx: 8; ry: 8; }
    .text-main { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #333; }
    .text-title { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; fill: #000; text-anchor: middle; }
    .text-file { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: bold; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed-line { stroke: #888; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <text x="450" y="40" class="text-title">2_Prompts Folder: Overall Logic &amp; Workflow</text>

  <g transform="translate(50, 80)">
    <rect width="240" height="130" fill="#e3f2fd" stroke="#1e88e5" class="box" />
    <text x="120" y="-10" class="text-main" font-weight="bold" text-anchor="middle">Phase 1: Prompt Design</text>
    <text x="20" y="30" class="text-file">prompt_generator.py</text>
    <text x="20" y="55" class="text-main" font-size="12">1. defines PromptTemplate</text>
    <text x="20" y="75" class="text-main" font-size="12">2. adds input_variables</text>
    <text x="20" y="95" class="text-main" font-size="12">3. executes template.save()</text>
  </g>

  <g transform="translate(370, 105)">
    <rect width="160" height="80" fill="#fff9c4" stroke="#fbc02d" class="box" />
    <text x="80" y="35" class="text-file" text-anchor="middle">template.json</text>
    <text x="80" y="60" class="text-main" font-size="11" text-anchor="middle">Saves prompt structure</text>
  </g>

  <g transform="translate(610, 80)">
    <rect width="250" height="160" fill="#f3e5f5" stroke="#8e24aa" class="box" />
    <text x="125" y="-10" class="text-main" font-weight="bold" text-anchor="middle">Phase 2: App Execution</text>
    <text x="15" y="30" class="text-file">Research_Paper_Summarizer.py</text>
    <text x="15" y="60" class="text-main" font-size="12">1. load_prompt('template.json')</text>
    <text x="15" y="85" class="text-main" font-size="12">2. Streamlit UI takes User inputs</text>
    <text x="15" y="110" class="text-main" font-size="12">3. template.invoke(inputs)</text>
    <text x="15" y="135" class="text-main" font-size="12">4. chat_model.invoke(prompt)</text>
  </g>

  <path d="M 290 145 L 360 145" class="arrow" />
  <path d="M 530 145 L 600 145" class="arrow" />

  <g transform="translate(50, 300)">
    <rect width="810" height="180" fill="#f1f8e9" stroke="#558b2f" class="box" />
    <text x="405" y="25" class="text-main" font-weight="bold" text-anchor="middle">Core Concepts &amp; Independent Learning Files</text>
    
    <rect x="30" y="50" width="230" height="100" fill="#fff" stroke="#999" class="box" />
    <text x="45" y="75" class="text-file">messages.py</text>
    <text x="45" y="100" class="text-main" font-size="12">Learn Base Messages</text>
    <text x="45" y="120" class="text-main" font-size="11" fill="#666">(System, Human, AI)</text>

    <rect x="290" y="50" width="230" height="100" fill="#fff" stroke="#999" class="box" />
    <text x="305" y="75" class="text-file">chat_prompt_template.py</text>
    <text x="305" y="100" class="text-main" font-size="12">Dynamic Chat Logic</text>
    <text x="305" y="120" class="text-main" font-size="11" fill="#666">(Key-Value Pairs)</text>

    <rect x="550" y="50" width="230" height="100" fill="#fff" stroke="#999" class="box" />
    <text x="565" y="75" class="text-file">message_placeholder.py</text>
    <text x="565" y="100" class="text-main" font-size="12">Memory &amp; History</text>
    <text x="565" y="120" class="text-main" font-size="11" fill="#666">(Chat History Injection)</text>
  </g>

  <text x="450" y="520" class="text-main" font-size="12" font-style="italic" text-anchor="middle">
    Flow: Design Prompt (Generator) ➔ Save (JSON) ➔ Run App (Summarizer) ➔ Call OpenAI API.
  </text>
</svg>
