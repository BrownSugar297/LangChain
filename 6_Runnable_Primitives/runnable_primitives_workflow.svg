    <text x="140" y="-10" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Phase 3: Passthrough</text>
