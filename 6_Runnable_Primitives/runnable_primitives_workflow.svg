    <text x="48" y="98" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Wraps a plain Python function as a Runnable</text>
    <text x="48" y="118" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">word_count() → RunnableLambda(word_count)</text>
    <text x="48" y="138" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Output: {joke: "...", word_count: 42}</text>

    <!-- Card 2: Branch -->
    <rect x="435" y="50" width="375" height="110" rx="6" ry="6" fill="#fff" stroke="#aaa" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(170, 170, 170);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="453" y="75" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#b71c1c" style="fill:rgb(183, 28, 28);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">runnable_branch.py</text>
    <text x="453" y="98" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Conditional routing based on output length</text>
    <text x="453" y="118" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">if words &gt; 500 → summarize chain</text>
