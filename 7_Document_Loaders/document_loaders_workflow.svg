<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="36" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#000" text-anchor="middle" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:18px;font-weight:700;text-anchor:middle;dominant-baseline:auto">document_loaders/ Folder: Overall Logic &amp; Workflow</text>

  <!-- Phase 1: PDF Loader -->
  <g transform="translate(30, 65)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect width="220" height="155" rx="8" ry="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2" style="fill:rgb(227, 242, 253);stroke:rgb(30, 136, 229);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="110" y="-10" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Phase 1: PDF Loading</text>
    <text x="16" y="28" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1565c0" style="fill:rgb(21, 101, 192);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">pdf_loader.py</text>
    <text x="16" y="52" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">1. PyPDFLoader("file.pdf")</text>
    <text x="16" y="72" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">2. loader.load()</text>
    <text x="16" y="92" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">3. Returns list of Documents</text>
    <text x="16" y="112" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">4. page_content + metadata</text>
    <text x="16" y="135" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Text extraction only</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 252 148 L 302 148" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)" style="fill:none;stroke:rgb(85, 85, 85);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Phase 2: Text Loader -->
  <g transform="translate(304, 65)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect width="220" height="155" rx="8" ry="8" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" style="fill:rgb(243, 229, 245);stroke:rgb(142, 36, 170);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="110" y="-10" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Phase 2: Text + LLM</text>
    <text x="16" y="28" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#6a1b9a" style="fill:rgb(106, 27, 154);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">text_loader.py</text>
    <text x="16" y="52" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">1. TextLoader("cricket.txt")</text>
    <text x="16" y="72" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">2. loader.load() → docs</text>
    <text x="16" y="92" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">3. prompt | llm | parser</text>
    <text x="16" y="112" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">4. chain.invoke({'poem':…})</text>
    <text x="16" y="135" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Groq · llama-3.3-70b</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 526 148 L 576 148" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)" style="fill:none;stroke:rgb(85, 85, 85);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Phase 3: Web Loader -->
  <g transform="translate(578, 65)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect width="290" height="155" rx="8" ry="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" style="fill:rgb(232, 245, 233);stroke:rgb(56, 142, 60);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="145" y="-10" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Phase 3: Web + QA Chain</text>
    <text x="16" y="28" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1b5e20" style="fill:rgb(27, 94, 32);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">webbase_loader.py</text>
    <text x="16" y="52" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">1. WebBaseLoader(url)</text>
    <text x="16" y="72" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">2. loader.load() → docs</text>
    <text x="16" y="92" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">3. prompt: question + text</text>
    <text x="16" y="112" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">4. chain.invoke({question, text})</text>
    <text x="16" y="135" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Amazon product QA · Groq</text>
  </g>

  <!-- Bottom section -->
  <g transform="translate(30, 305)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect width="840" height="215" rx="8" ry="8" fill="#fff9c4" stroke="#f9a825" stroke-width="2" style="fill:rgb(255, 249, 196);stroke:rgb(249, 168, 37);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="420" y="26" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Structured Data Loaders: CSV &amp; Directory</text>

    <!-- CSV Card -->
    <rect x="30" y="48" width="370" height="135" rx="6" ry="6" fill="#fff" stroke="#aaa" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(170, 170, 170);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="48" y="74" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" style="fill:rgb(230, 81, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">csv_loader.py</text>
    <text x="48" y="97" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">1. CSVLoader(file_path='Social_Network_Ads.csv')</text>
    <text x="48" y="117" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">2. loader.load() → list of Documents</text>
    <text x="48" y="137" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">3. Each row = one Document</text>
    <text x="48" y="157" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">page_content (row data) + metadata (source, row)</text>

    <!-- Directory Card -->
    <rect x="435" y="48" width="375" height="135" rx="6" ry="6" fill="#fff" stroke="#aaa" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(170, 170, 170);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="453" y="74" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1a237e" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">directory_loader.py</text>
    <text x="453" y="97" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">1. DirectoryLoader(path='books', glob='*.pdf')</text>
    <text x="453" y="117" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">2. loader_cls=PyPDFLoader</text>
    <text x="453" y="137" font-family="Segoe UI, sans-serif" font-size="11" fill="#333" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">3. load() or lazy_load()</text>
    <text x="453" y="157" font-family="Segoe UI, sans-serif" font-size="11" fill="#777" style="fill:rgb(119, 119, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Batch loads all PDFs from folder</text>
  </g>

  <!-- Dashed arrows down -->
  <path d="M 140 222 L 140 303" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)" style="fill:none;stroke:rgb(136, 136, 136);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-dasharray:5px, 5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 723 222 L 723 303" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)" style="fill:none;stroke:rgb(136, 136, 136);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-dasharray:5px, 5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Footer -->
  <text x="450" y="562" font-family="Segoe UI, sans-serif" font-size="12" font-style="italic" fill="#555" text-anchor="middle" style="fill:rgb(85, 85, 85);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">
    Flow: Load Source (PDF/Text/Web/CSV/Dir) → .load() → Documents → prompt | LLM | parser → Response
  </text>
</svg>